  <text class="m" fill="#6272a4" x="301" y="25" text-anchor="middle" font-size="12">hello.py</text>
  <line x1="0" y1="40" x2="603" y2="40" stroke="#44475a" stroke-width="1"/>
  <text class="m" fill="#6272a4" x="58" y="73" text-anchor="end" font-size="13">1</text>
  <text class="m" fill="#f8f8f2" x="68" y="73" xml:space="preserve"><tspan fill="#ff79c6">import</tspan> math</text>
