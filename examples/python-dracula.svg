  <text class="m" fill="#6272a4" x="58" y="117" text-anchor="end" font-size="13">3</text>
  <text class="m" fill="#6272a4" x="58" y="139" text-anchor="end" font-size="13">4</text>
  <text class="m" fill="#6272a4" x="58" y="161" text-anchor="end" font-size="13">5</text>
