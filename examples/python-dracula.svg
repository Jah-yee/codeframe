  <text class="m" fill="#6272a4" x="58" y="403" text-anchor="end" font-size="13">16</text>
  <text class="m" fill="#6272a4" x="58" y="425" text-anchor="end" font-size="13">17</text>
  <text class="m" fill="#f8f8f2" x="68" y="425" xml:space="preserve">    <tspan fill="#50fa7b">@property</tspan></text>
  <text class="m" fill="#6272a4" x="58" y="447" text-anchor="end" font-size="13">18</text>
  <text class="m" fill="#f8f8f2" x="68" y="447" xml:space="preserve">    <tspan fill="#ff79c6">def</tspan> <tspan fill="#50fa7b">speed</tspan><tspan fill="#ff79c6">(</tspan><tspan fill="#8be9fd">self</tspan><tspan fill="#ff79c6">)</tspan> <tspan fill="#ff79c6">-</tspan><tspan fill="#ff79c6">&gt;</tspan> <tspan fill="#8be9fd">float</tspan><tspan fill="#ff79c6">:</tspan></text>
  <text class="m" fill="#6272a4" x="58" y="469" text-anchor="end" font-size="13">19</text>
  <text class="m" fill="#f8f8f2" x="68" y="469" xml:space="preserve">        <tspan fill="#ff79c6">return</tspan> math<tspan fill="#ff79c6">.</tspan>sqrt<tspan fill="#ff79c6">(</tspan><tspan fill="#8be9fd">self</tspan><tspan fill="#ff79c6">.</tspan>vx<tspan fill="#ff79c6">*</tspan><tspan fill="#ff79c6">*</tspan><tspan fill="#bd93f9">2</tspan> <tspan fill="#ff79c6">+</tspan> <tspan fill="#8be9fd">self</tspan><tspan fill="#ff79c6">.</tspan>vy<tspan fill="#ff79c6">*</tspan><tspan fill="#ff79c6">*</tspan><tspan fill="#bd93f9">2</tspan><tspan fill="#ff79c6">)</tspan></text>
  <text class="m" fill="#6272a4" x="58" y="491" text-anchor="end" font-size="13">20</text>
  <text class="m" fill="#6272a4" x="58" y="513" text-anchor="end" font-size="13">21</text>
  <text class="m" fill="#6272a4" x="58" y="535" text-anchor="end" font-size="13">22</text>
  <text class="m" fill="#f8f8f2" x="68" y="535" xml:space="preserve"><tspan fill="#ff79c6">def</tspan> <tspan fill="#50fa7b">simulate</tspan><tspan fill="#ff79c6">(</tspan>particles<tspan fill="#ff79c6">:</tspan> <tspan fill="#8be9fd">list</tspan><tspan fill="#ff79c6">[</tspan>Particle<tspan fill="#ff79c6">]</tspan><tspan fill="#ff79c6">,</tspan> steps<tspan fill="#ff79c6">:</tspan> <tspan fill="#8be9fd">int</tspan> <tspan fill="#ff79c6">=</tspan> <tspan fill="#bd93f9">1000</tspan><tspan fill="#ff79c6">)</tspan><tspan fill="#ff79c6">:</tspan></text>
  <text class="m" fill="#6272a4" x="58" y="557" text-anchor="end" font-size="13">23</text>
  <text class="m" fill="#f8f8f2" x="68" y="557" xml:space="preserve">    <tspan fill="#f1fa8c">&quot;&quot;&quot;Run a simple n-body simulation.&quot;&quot;&quot;</tspan></text>
  <text class="m" fill="#6272a4" x="58" y="579" text-anchor="end" font-size="13">24</text>
  <text class="m" fill="#f8f8f2" x="68" y="579" xml:space="preserve">    <tspan fill="#ff79c6">for</tspan> _ <tspan fill="#ff79c6">in</tspan> <tspan fill="#8be9fd">range</tspan><tspan fill="#ff79c6">(</tspan>steps<tspan fill="#ff79c6">)</tspan><tspan fill="#ff79c6">:</tspan></text>
  <text class="m" fill="#6272a4" x="58" y="601" text-anchor="end" font-size="13">25</text>
  <text class="m" fill="#f8f8f2" x="68" y="601" xml:space="preserve">        <tspan fill="#ff79c6">for</tspan> p <tspan fill="#ff79c6">in</tspan> particles<tspan fill="#ff79c6">:</tspan></text>
  <text class="m" fill="#6272a4" x="58" y="623" text-anchor="end" font-size="13">26</text>
  <text class="m" fill="#f8f8f2" x="68" y="623" xml:space="preserve">            p<tspan fill="#ff79c6">.</tspan>step<tspan fill="#ff79c6">(</tspan><tspan fill="#ff79c6">)</tspan></text>
  <text class="m" fill="#6272a4" x="58" y="645" text-anchor="end" font-size="13">27</text>
  <text class="m" fill="#f8f8f2" x="68" y="645" xml:space="preserve">    <tspan fill="#ff79c6">return</tspan> <tspan fill="#ff79c6">[</tspan>p<tspan fill="#ff79c6">.</tspan>speed <tspan fill="#ff79c6">for</tspan> p <tspan fill="#ff79c6">in</tspan> particles<tspan fill="#ff79c6">]</tspan></text>
