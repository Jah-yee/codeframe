  <text class="m" fill="#f8f8f2" x="68" y="271" xml:space="preserve">    vx<tspan fill="#ff79c6">:</tspan> <tspan fill="#8be9fd">float</tspan> <tspan fill="#ff79c6">=</tspan> <tspan fill="#bd93f9">0.0</tspan></text>
  <text class="m" fill="#6272a4" x="58" y="293" text-anchor="end" font-size="13">11</text>
