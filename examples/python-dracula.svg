  <text class="m" fill="#f8f8f2" x="68" y="183" xml:space="preserve"><tspan fill="#ff79c6">class</tspan> <tspan fill="#ffb86c">Particle</tspan><tspan fill="#ff79c6">:</tspan></text>
  <text class="m" fill="#6272a4" x="58" y="205" text-anchor="end" font-size="13">7</text>
  <text class="m" fill="#f8f8f2" x="68" y="205" xml:space="preserve">    <tspan fill="#f1fa8c">&quot;&quot;&quot;A particle in 2D space with velocity.&quot;&quot;&quot;</tspan></text>
