  <text class="m" fill="#6272a4" x="58" y="315" text-anchor="end" font-size="13">12</text>
  <text class="m" fill="#6272a4" x="58" y="337" text-anchor="end" font-size="13">13</text>
  <text class="m" fill="#f8f8f2" x="68" y="337" xml:space="preserve">    <tspan fill="#ff79c6">def</tspan> <tspan fill="#50fa7b">step</tspan><tspan fill="#ff79c6">(</tspan><tspan fill="#8be9fd">self</tspan><tspan fill="#ff79c6">,</tspan> dt<tspan fill="#ff79c6">:</tspan> <tspan fill="#8be9fd">float</tspan> <tspan fill="#ff79c6">=</tspan> <tspan fill="#bd93f9">0.016</tspan><tspan fill="#ff79c6">)</tspan><tspan fill="#ff79c6">:</tspan></text>
  <text class="m" fill="#6272a4" x="58" y="359" text-anchor="end" font-size="13">14</text>
  <text class="m" fill="#f8f8f2" x="68" y="359" xml:space="preserve">        <tspan fill="#8be9fd">self</tspan><tspan fill="#ff79c6">.</tspan>x <tspan fill="#ff79c6">+</tspan><tspan fill="#ff79c6">=</tspan> <tspan fill="#8be9fd">self</tspan><tspan fill="#ff79c6">.</tspan>vx <tspan fill="#ff79c6">*</tspan> dt</text>
  <text class="m" fill="#6272a4" x="58" y="381" text-anchor="end" font-size="13">15</text>
