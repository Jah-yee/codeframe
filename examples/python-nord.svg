  <text class="m" fill="#616e88" x="301" y="25" text-anchor="middle" font-size="12">hello.py</text>
  <line x1="0" y1="40" x2="603" y2="40" stroke="#3b4252" stroke-width="1"/>
  <text class="m" fill="#4c566a" x="58" y="73" text-anchor="end" font-size="13">1</text>
  <text class="m" fill="#d8dee9" x="68" y="73" xml:space="preserve"><tspan fill="#81a1c1">import</tspan> math</text>
  <text class="m" fill="#4c566a" x="58" y="95" text-anchor="end" font-size="13">2</text>
  <text class="m" fill="#d8dee9" x="68" y="95" xml:space="preserve"><tspan fill="#81a1c1">from</tspan> dataclasses <tspan fill="#81a1c1">import</tspan> dataclass</text>
  <text class="m" fill="#4c566a" x="58" y="117" text-anchor="end" font-size="13">3</text>
  <text class="m" fill="#4c566a" x="58" y="139" text-anchor="end" font-size="13">4</text>
  <text class="m" fill="#4c566a" x="58" y="161" text-anchor="end" font-size="13">5</text>
  <text class="m" fill="#d8dee9" x="68" y="161" xml:space="preserve"><tspan fill="#b48ead">@dataclass</tspan></text>
  <text class="m" fill="#4c566a" x="58" y="183" text-anchor="end" font-size="13">6</text>
  <text class="m" fill="#d8dee9" x="68" y="183" xml:space="preserve"><tspan fill="#81a1c1">class</tspan> <tspan fill="#ebcb8b">Particle</tspan><tspan fill="#81a1c1">:</tspan></text>
  <text class="m" fill="#4c566a" x="58" y="205" text-anchor="end" font-size="13">7</text>
  <text class="m" fill="#d8dee9" x="68" y="205" xml:space="preserve">    <tspan fill="#a3be8c">&quot;&quot;&quot;A particle in 2D space with velocity.&quot;&quot;&quot;</tspan></text>
  <text class="m" fill="#4c566a" x="58" y="227" text-anchor="end" font-size="13">8</text>
  <text class="m" fill="#d8dee9" x="68" y="227" xml:space="preserve">    x<tspan fill="#81a1c1">:</tspan> <tspan fill="#8fbcbb">float</tspan></text>
  <text class="m" fill="#4c566a" x="58" y="249" text-anchor="end" font-size="13">9</text>
  <text class="m" fill="#d8dee9" x="68" y="249" xml:space="preserve">    y<tspan fill="#81a1c1">:</tspan> <tspan fill="#8fbcbb">float</tspan></text>
  <text class="m" fill="#4c566a" x="58" y="271" text-anchor="end" font-size="13">10</text>
  <text class="m" fill="#d8dee9" x="68" y="271" xml:space="preserve">    vx<tspan fill="#81a1c1">:</tspan> <tspan fill="#8fbcbb">float</tspan> <tspan fill="#81a1c1">=</tspan> <tspan fill="#b48ead">0.0</tspan></text>
  <text class="m" fill="#4c566a" x="58" y="293" text-anchor="end" font-size="13">11</text>
  <text class="m" fill="#d8dee9" x="68" y="293" xml:space="preserve">    vy<tspan fill="#81a1c1">:</tspan> <tspan fill="#8fbcbb">float</tspan> <tspan fill="#81a1c1">=</tspan> <tspan fill="#b48ead">0.0</tspan></text>
  <text class="m" fill="#4c566a" x="58" y="315" text-anchor="end" font-size="13">12</text>
  <text class="m" fill="#4c566a" x="58" y="337" text-anchor="end" font-size="13">13</text>
  <text class="m" fill="#d8dee9" x="68" y="337" xml:space="preserve">    <tspan fill="#81a1c1">def</tspan> <tspan fill="#88c0d0">step</tspan><tspan fill="#81a1c1">(</tspan><tspan fill="#8fbcbb">self</tspan><tspan fill="#81a1c1">,</tspan> dt<tspan fill="#81a1c1">:</tspan> <tspan fill="#8fbcbb">float</tspan> <tspan fill="#81a1c1">=</tspan> <tspan fill="#b48ead">0.016</tspan><tspan fill="#81a1c1">)</tspan><tspan fill="#81a1c1">:</tspan></text>
  <text class="m" fill="#4c566a" x="58" y="359" text-anchor="end" font-size="13">14</text>
  <text class="m" fill="#d8dee9" x="68" y="359" xml:space="preserve">        <tspan fill="#8fbcbb">self</tspan><tspan fill="#81a1c1">.</tspan>x <tspan fill="#81a1c1">+</tspan><tspan fill="#81a1c1">=</tspan> <tspan fill="#8fbcbb">self</tspan><tspan fill="#81a1c1">.</tspan>vx <tspan fill="#81a1c1">*</tspan> dt</text>
  <text class="m" fill="#4c566a" x="58" y="381" text-anchor="end" font-size="13">15</text>
  <text class="m" fill="#d8dee9" x="68" y="381" xml:space="preserve">        <tspan fill="#8fbcbb">self</tspan><tspan fill="#81a1c1">.</tspan>y <tspan fill="#81a1c1">+</tspan><tspan fill="#81a1c1">=</tspan> <tspan fill="#8fbcbb">self</tspan><tspan fill="#81a1c1">.</tspan>vy <tspan fill="#81a1c1">*</tspan> dt</text>
  <text class="m" fill="#4c566a" x="58" y="403" text-anchor="end" font-size="13">16</text>
  <text class="m" fill="#4c566a" x="58" y="425" text-anchor="end" font-size="13">17</text>
  <text class="m" fill="#d8dee9" x="68" y="425" xml:space="preserve">    <tspan fill="#b48ead">@property</tspan></text>
  <text class="m" fill="#4c566a" x="58" y="447" text-anchor="end" font-size="13">18</text>
  <text class="m" fill="#d8dee9" x="68" y="447" xml:space="preserve">    <tspan fill="#81a1c1">def</tspan> <tspan fill="#88c0d0">speed</tspan><tspan fill="#81a1c1">(</tspan><tspan fill="#8fbcbb">self</tspan><tspan fill="#81a1c1">)</tspan> <tspan fill="#81a1c1">-</tspan><tspan fill="#81a1c1">&gt;</tspan> <tspan fill="#8fbcbb">float</tspan><tspan fill="#81a1c1">:</tspan></text>
  <text class="m" fill="#4c566a" x="58" y="469" text-anchor="end" font-size="13">19</text>
  <text class="m" fill="#d8dee9" x="68" y="469" xml:space="preserve">        <tspan fill="#81a1c1">return</tspan> math<tspan fill="#81a1c1">.</tspan>sqrt<tspan fill="#81a1c1">(</tspan><tspan fill="#8fbcbb">self</tspan><tspan fill="#81a1c1">.</tspan>vx<tspan fill="#81a1c1">*</tspan><tspan fill="#81a1c1">*</tspan><tspan fill="#b48ead">2</tspan> <tspan fill="#81a1c1">+</tspan> <tspan fill="#8fbcbb">self</tspan><tspan fill="#81a1c1">.</tspan>vy<tspan fill="#81a1c1">*</tspan><tspan fill="#81a1c1">*</tspan><tspan fill="#b48ead">2</tspan><tspan fill="#81a1c1">)</tspan></text>
  <text class="m" fill="#4c566a" x="58" y="491" text-anchor="end" font-size="13">20</text>
  <text class="m" fill="#4c566a" x="58" y="513" text-anchor="end" font-size="13">21</text>
  <text class="m" fill="#4c566a" x="58" y="535" text-anchor="end" font-size="13">22</text>
  <text class="m" fill="#d8dee9" x="68" y="535" xml:space="preserve"><tspan fill="#81a1c1">def</tspan> <tspan fill="#88c0d0">simulate</tspan><tspan fill="#81a1c1">(</tspan>particles<tspan fill="#81a1c1">:</tspan> <tspan fill="#8fbcbb">list</tspan><tspan fill="#81a1c1">[</tspan>Particle<tspan fill="#81a1c1">]</tspan><tspan fill="#81a1c1">,</tspan> steps<tspan fill="#81a1c1">:</tspan> <tspan fill="#8fbcbb">int</tspan> <tspan fill="#81a1c1">=</tspan> <tspan fill="#b48ead">1000</tspan><tspan fill="#81a1c1">)</tspan><tspan fill="#81a1c1">:</tspan></text>
  <text class="m" fill="#4c566a" x="58" y="557" text-anchor="end" font-size="13">23</text>
  <text class="m" fill="#d8dee9" x="68" y="557" xml:space="preserve">    <tspan fill="#a3be8c">&quot;&quot;&quot;Run a simple n-body simulation.&quot;&quot;&quot;</tspan></text>
  <text class="m" fill="#4c566a" x="58" y="579" text-anchor="end" font-size="13">24</text>
  <text class="m" fill="#d8dee9" x="68" y="579" xml:space="preserve">    <tspan fill="#81a1c1">for</tspan> _ <tspan fill="#81a1c1">in</tspan> <tspan fill="#8fbcbb">range</tspan><tspan fill="#81a1c1">(</tspan>steps<tspan fill="#81a1c1">)</tspan><tspan fill="#81a1c1">:</tspan></text>
  <text class="m" fill="#4c566a" x="58" y="601" text-anchor="end" font-size="13">25</text>
  <text class="m" fill="#d8dee9" x="68" y="601" xml:space="preserve">        <tspan fill="#81a1c1">for</tspan> p <tspan fill="#81a1c1">in</tspan> particles<tspan fill="#81a1c1">:</tspan></text>
  <text class="m" fill="#4c566a" x="58" y="623" text-anchor="end" font-size="13">26</text>
  <text class="m" fill="#d8dee9" x="68" y="623" xml:space="preserve">            p<tspan fill="#81a1c1">.</tspan>step<tspan fill="#81a1c1">(</tspan><tspan fill="#81a1c1">)</tspan></text>
  <text class="m" fill="#4c566a" x="58" y="645" text-anchor="end" font-size="13">27</text>
  <text class="m" fill="#d8dee9" x="68" y="645" xml:space="preserve">    <tspan fill="#81a1c1">return</tspan> <tspan fill="#81a1c1">[</tspan>p<tspan fill="#81a1c1">.</tspan>speed <tspan fill="#81a1c1">for</tspan> p <tspan fill="#81a1c1">in</tspan> particles<tspan fill="#81a1c1">]</tspan></text>
</svg>